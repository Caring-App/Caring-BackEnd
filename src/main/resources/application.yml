spring:
  profiles:
    include: secret
  datasource:
    url: "jdbc:mysql://localhost:3306/caring?serverTimezone=Asia/Seoul&characterEncoding=UTF-8"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
server:
  port: 8080